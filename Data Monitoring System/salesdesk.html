<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Desk</title>
    <link rel="stylesheet" href="salesdesk.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">

    <header class="header">
        <h1>Sales Desk</h1>
    </header>

    <!-- ADMIN PANEL -->
    <section class="admin-grid">
        <div class="card">
            <h3>Create Category</h3>
            <input type="text" id="newCategoryName" placeholder="e.g. Rejected Items">
            <button onclick="createNewCategory()">Create</button>
        </div>

        <div class="card">
            <h3>Add Column (<span id="activeCategoryName">...</span>)</h3>
            <div class="row">
                <input type="text" id="newColumnName" placeholder="Column Name">
                <select id="newColumnType">
                    <option value="text">Text</option>
                    <option value="number">Number</option>
                    <option value="date">Date</option>
                </select>
                <button onclick="addColumnToActive()">Add</button>
            </div>
        </div>
    </section>

    <!-- CONTROLS -->
     <h3><br>Select Category</h3>
    <section class="controls">
        <select id="categoryDropdown" onchange="switchCategory(this.value)"></select>
        <input type="text" id="search" placeholder="Search..." oninput="searchData()">
        <button onclick="sortByDate()">Sort by Date</button>
        <button onclick="exportToExcel()">Export Excel</button>
    </section>

    <!-- FORM -->
    <section class="card">
        <h3>Entry Form</h3>
        <div id="dynamicForm" class="grid-form"></div>
    </section>

    <!-- TABLE -->
    <section class="card">
        <div class="table-wrapper">
            <table id="mainTable">
                <thead id="tableHeaders"></thead>
                <tbody id="tableData"></tbody>
            </table>
        </div>
    </section>

</div>

<script type="module" src="salesdesk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</body>
</html>
