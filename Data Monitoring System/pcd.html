<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCD Desk</title>

<link rel="stylesheet" href="pcd.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>
<div class="container">

    <!-- HEADER -->
    <header class="header">
        <h1>Sales Order Desk</h1>
        <button class="add-cat-btn" onclick="openModal()">+ New Category</button>
    </header>

    <!-- CATEGORY CARDS -->

    <h3>Select Category</h3>
    <div class="category-nav-wrapper">
        <input type="text" id="categorySearch" placeholder="Search categories..." style="margin-bottom:10px;width:100%;padding:8px;box-sizing:border-box;" oninput="filterCategoryCards()">
        <div id="categoryCards" class="category-scroll-container"></div>
    </div>

    <!-- WORKSPACE -->
    <div id="moduleWorkspace" style="display:none;">

        <!-- ENTRY FORM -->
        <section class="card">
            <h3>Entry Form</h3>
            <div id="dynamicForm" class="grid-form"></div>
        </section>

        <!-- ACTION BAR -->
        <section class="controls">
            <div class="action-bar">
                <input type="text" id="search" placeholder="Search records..." oninput="searchData()">
                <button onclick="deleteSelected()">Delete Selected</button>
                <button onclick="sortByDate()">Sort by Date</button>
                <button onclick="exportToExcel()">Export Excel</button>
                <button onclick="openImportModal()">Import Excel</button>
                <button class="add-cat-btn" onclick="openColumnModal()">+ Add Column</button>
            </div>
        </section>

        <!-- DATA TABLE -->
        <section class="card">
            <div class="table-wrapper">
                <table>
                    <thead id="tableHeaders"></thead>
                    <tbody id="tableData"></tbody>
                </table>
            </div>
        </section>

    </div>
</div>

<!-- ===================== MODALS ===================== -->

<!-- CATEGORY MODAL -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3>New Category</h3>
        <input type="text" id="newCategoryName" placeholder="e.g. Pickup, Encoding, Sales">
        <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button onclick="createNewCategory()">Create</button>
        </div>
    </div>
</div>

<!-- COLUMN MODAL -->
<div id="columnModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeColumnModal()">&times;</span>
        <h3>Add Column</h3>
        <input type="text" id="newColumnName" placeholder="Column name">
        <select id="newColumnType">
            <option value="text">Text</option>
            <option value="number">Number</option>
            <option value="date">Date</option>
        </select>
        <div class="modal-actions">
            <button onclick="closeColumnModal()">Cancel</button>
            <button onclick="addColumnToActive()">Add</button>
        </div>
    </div>
</div>

<!-- EDIT ENTRY MODAL -->
<div id="editModal" class="modal">
    <div class="modal-content edit-modal-content">
        <span class="close-btn" onclick="closeEditModal()">&times;</span>
        <h3>Edit Record</h3>
        <div id="editForm" class="edit-grid-form"></div>
        <div class="modal-actions">
            <button onclick="closeEditModal()">Cancel</button>
            <button id="editSaveBtn" onclick="saveEditEntry()">Save Changes</button>
        </div>
    </div>
</div>

<!-- IMPORT MODAL -->
<div id="importModal" class="modal">
    <div class="modal-content import-modal-content">
        <span class="close-btn" onclick="closeImportModal()">&times;</span>
        <h3>Import from Excel</h3>

        <!-- Step 1 -->
        <label class="modal-label">1. Choose File</label>
        <input type="file" id="importFile" accept=".xlsx,.xls" onchange="loadSheets()">

        <!-- Step 2 -->
        <label class="modal-label">2. Select Sheet</label>
        <select id="importSheet" disabled>
            <option>— load a file first —</option>
        </select>

        <!-- Step 3 -->
        <label class="modal-label">3. Header Row Number</label>
        <input type="number" id="importHeaderRow" value="1" min="1" oninput="previewSheet()">
        <p class="import-hint">
            Which row has your column names? Most files use row 1.
            Use row 4 for files with title/summary rows on top.
        </p>

        <!-- Detected Excel columns -->
        <div id="importExcelHeaders"></div>

        <!-- FIX #4: Manual column mapping UI -->
        <div id="importColMapping"></div>

        <!-- Preview / match status -->
        <div id="importPreview"></div>

        <div class="modal-actions">
            <button onclick="closeImportModal()">Cancel</button>
            <button id="importConfirmBtn" onclick="confirmImport()" disabled>Import</button>
        </div>
    </div>
</div>

<div id="contextMenu" class="context-menu">
    <button id="ctxEdit">Edit Row</button>
    <button id="ctxDelete" class="delete">Delete Row</button>
</div>

<script type="module" src="pcd.js"></script>
</body>
</html>
